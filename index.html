<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>LingoTrain — аудио-тренажёр с произношением</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    .app-layout {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-top: 10vh;
    }

    .sidebar {
      flex: 0 0 280px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      border-radius: 2rem;
      padding: 1.5rem 1.2rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
      height: 75vh;
      position: sticky;
      top: 20px;
      overflow-y: auto;
    }

    .sidebar h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1e293b;
      margin: 1rem 0 0.6rem 0;
      border-left: 3px solid #3b82f6;
      padding-left: 10px;
    }
    .sidebar h3:first-of-type {
      margin-top: 0;
    }

    .file-section {
      background: #f1f5f9;
      border-radius: 1.5rem;
      padding: 0.8rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    .file-label {
      background: #0f2b3d;
      color: white;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }
    .file-label:hover { background: #1e4a6e; transform: scale(0.97); }
    #fileInput { display: none; }
    .word-count {
      margin-top: 10px;
      font-size: 0.75rem;
      color: #334155;
      font-weight: 500;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 0.5rem 0 1rem 0;
    }
    .mode-btn, .type-btn, .dir-btn, .small-action {
      background: #f1f5f9;
      border: none;
      padding: 8px 12px;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .mode-btn.active, .type-btn.active, .dir-btn.active {
      background: #0f2b3d;
      color: white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .small-action {
      background: #e2e8f0;
      justify-content: center;
      margin-top: 8px;
    }
    .small-action:hover { background: #cbd5e1; }

    .main-content {
      flex: 1;
      min-width: 280px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .quiz-card {
      background: white;
      border-radius: 2.5rem;
      padding: 2rem 2rem 2rem 2rem;
      width: 100%;
      height: 75vh;
      max-width: 750px;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25);
      transition: all 0.2s ease;
      text-align: center;
      display: flex;
      flex-direction: column;
    }

    .question-header {
      font-size: 0.9rem;
      color: #3b82f6;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }

    .question-word {
      font-size: 2.5rem;
      font-weight: 700;
      color: #0f172a;
      margin: 0.5rem 0 1rem 0;
      word-break: break-word;
      background: linear-gradient(135deg, #0f2b3d, #2c5a7a);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin: 1.8rem 0;
    }

    .option-btn {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      padding: 14px 8px;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
      color: #0f172a;
      text-align: center;
      word-break: break-word;
    }
    .option-btn:hover:not(:disabled) {
      background: #eef2ff;
      border-color: #94a3b8;
      transform: translateY(-2px);
    }
    .option-btn.correct-highlight {
      background: #bbf7d0;
      border-color: #15803d;
      color: #14532d;
    }
    .option-btn.wrong-highlight {
      background: #ffe4e2;
      border-color: #b91c1c;
      color: #7f1a1a;
      text-decoration: line-through;
    }

    .input-area {
      max-width: 400px;
      margin: 1rem auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #answerInput {
      padding: 14px 20px;
      font-size: 1rem;
      border: 2px solid #cbd5e1;
      border-radius: 60px;
      outline: none;
      text-align: center;
    }
    #answerInput:focus { border-color: #0f2b3d; box-shadow: 0 0 0 3px rgba(15,43,61,0.2); }

    .action-btn {
      background: #0f2b3d;
      align-self: center;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 8px;
      width: 100%;
      max-width: 280px;
    }
    .action-btn:active { transform: scale(0.97); }
    .action-btn:disabled { background: #94a3b8; cursor: not-allowed; }

    .feedback {
      margin-top: 1rem;
      padding: 10px;
      border-radius: 60px;
      font-weight: 500;
    }

    .stats-bar {
      display: flex;
      justify-content: space-between;
      background: #f1f5f9;
      padding: 12px 24px;
      border-radius: 60px;
      margin-top: 1.5rem;
      font-weight: 600;
      color: #1e293b;
    }

    .hotkey-hint {
      font-size: 0.7rem;
      color: #5b6e8c;
      margin-top: auto;
      border-top: 1px solid #e2e8f0;
      padding-top: 1rem;
    }
    
    .audio-badge {
      margin-top: 8px;
      font-size: 0.75rem;
      background: #eef2ff;
      display: inline-block;
      padding: 4px 12px;
      border-radius: 40px;
      color: #1e40af;
    }

    /* кнопка озвучить термин */
    .speak-term-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 60px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 12px;
      width: auto;
      max-width: 200px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }
    .speak-term-btn:hover { background: #2563eb; transform: scale(0.98); }
    .speak-term-btn:active { transform: scale(0.95); }
    .button-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (max-width: 800px) {
      .app-layout { flex-direction: column; }
      .sidebar { flex: auto; position: static; width: 100%; }
      .options-grid { grid-template-columns: 1fr; }
      .question-word { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <div class="sidebar">
    <div class="file-section">
      <label class="file-label">
        📂 Загрузить .txt
        <input type="file" id="fileInput" accept=".txt">
      </label>
      <div class="word-count" id="wordCountDisplay">записей: 0</div>
      <div class="audio-badge" id="audioStatus">🔊 Аудио: из папки audio_terms/</div>
    </div>

    <h3>📌 Тип контента</h3>
    <div class="btn-group">
      <button class="type-btn" data-type="translation">📖 Переводы</button>
      <button class="type-btn active" data-type="definition">📚 Определения</button>
    </div>

    <h3>🎯 Режим ответа</h3>
    <div class="btn-group">
      <button class="mode-btn" data-mode="input">✍️ Точный ввод (Enter)</button>
      <button class="mode-btn active" data-mode="choice">🎲 Выбор варианта (1-4)</button>
    </div>

    <h3>🔄 Направление</h3>
    <div class="btn-group">
      <button class="dir-btn active" data-dir="forward">→ Термин → Определение/перевод</button>
      <button class="dir-btn" data-dir="reverse">← Определение/перевод → Термин</button>
    </div>

    <h3>⚙️ Управление</h3>
    <button id="shuffleBtn" class="small-action">🔄 Перемешать слова</button>
    <button id="resetStatsBtn" class="small-action">♻️ Сброс статистики</button>
  </div>

  <div class="main-content">
    <div class="quiz-card">
      <div class="question-header" id="questionHint">📖 Дайте определение</div>
      <div class="question-word" id="questionText">—</div>

      <div id="choiceModeContainer">
        <div class="options-grid" id="optionsGrid"></div>
      </div>

      <div id="inputModeContainer" style="display: none;">
        <div class="input-area">
          <input type="text" id="answerInput" placeholder="Введите ответ..." autocomplete="off">
          <button class="action-btn" id="checkAnswerBtn">✅ Проверить (Enter)</button>
        </div>
      </div>

      <div class="button-group">
        <button id="nextBtn" class="action-btn" disabled>➡️ Следующее слово (Enter)</button>
        <button id="speakTermBtn" class="speak-term-btn" style="display: none;">🔊 Озвучить термин</button>
      </div>
      <div id="feedbackArea" class="feedback"></div>

      <div class="stats-bar">
        <span>✅ Правильно: <strong id="correctCount">0</strong></span>
        <span>📋 Отвечено: <strong id="totalAnswered">0</strong></span>
        <span>📌 Прогресс: <strong id="progressIndex">0</strong> / <span id="totalWordsSpan">0</span></span>
      </div>
      <div class="hotkey-hint">
        ⌨️ Горячие клавиши: <strong>Enter</strong> — проверить / след. шаг | <strong>1-4</strong> — выбор ответа
      </div>
    </div>
  </div>
</div>

<script>
  // ========== ГЛОБАЛЬНЫЕ ==========
  let items = [];
  let currentIndex = 0;
  let correctAnswers = 0;
  let totalAnswered = 0;
  let isAnswered = false;
  let currentMode = "choice";
  let currentDirection = "forward";
  let currentType = "definition";
  let currentCorrectAnswer = "";
  let currentQuestionWord = "";
  let currentOptions = [];

  // DOM элементы
  const fileInput = document.getElementById("fileInput");
  const wordCountDisplay = document.getElementById("wordCountDisplay");
  const questionHint = document.getElementById("questionHint");
  const questionTextEl = document.getElementById("questionText");
  const choiceModeContainer = document.getElementById("choiceModeContainer");
  const inputModeContainer = document.getElementById("inputModeContainer");
  const optionsGrid = document.getElementById("optionsGrid");
  const answerInput = document.getElementById("answerInput");
  const checkAnswerBtn = document.getElementById("checkAnswerBtn");
  const nextBtn = document.getElementById("nextBtn");
  const speakTermBtn = document.getElementById("speakTermBtn");
  const correctCountSpan = document.getElementById("correctCount");
  const totalAnsweredSpan = document.getElementById("totalAnswered");
  const progressIndexSpan = document.getElementById("progressIndex");
  const totalWordsSpan = document.getElementById("totalWordsSpan");
  const feedbackArea = document.getElementById("feedbackArea");
  const shuffleBtn = document.getElementById("shuffleBtn");
  const resetStatsBtn = document.getElementById("resetStatsBtn");
  const audioStatusSpan = document.getElementById("audioStatus");

  const typeBtns = document.querySelectorAll(".type-btn");
  const modeBtns = document.querySelectorAll(".mode-btn");
  const dirBtns = document.querySelectorAll(".dir-btn");

  // ========== АУДИО ПРОИГРЫВАТЕЛЬ (MP3 из папки audio_terms) ==========
  let audioElement = null;
  let lastPlayedIndex = -1;

  function playTermAudio(index1based) {
    // index1based — номер строки в списке (1, 2, 3...)
    if (!items.length) return;
    if (index1based < 1 || index1based > items.length) return;
    
    // путь к аудио: audio_terms/timbrica-speech (N).mp3
    // где N = индекс от 0? в ваших файлах (0).mp3, (1).mp3 и т.д.
    // сопоставляем: строка 1 -> timbrica-speech (0).mp3
    const audioIndex = index1based - 1;
    const audioFileName = `audio_terms/timbrica-speech (${audioIndex}).mp3`;
    
    if (!audioElement) {
      audioElement = new Audio();
      audioElement.onerror = () => {
        console.warn(`Аудио не загружено: ${audioFileName}`);
        if (audioStatusSpan) {
          audioStatusSpan.innerText = "⚠️ Аудио не найдено";
          setTimeout(() => {
            if (audioStatusSpan.innerText === "⚠️ Аудио не найдено") 
              audioStatusSpan.innerText = "🔊 Аудио: из папки audio_terms/";
          }, 1500);
        }
      };
      audioElement.oncanplay = () => {
        if (audioStatusSpan) audioStatusSpan.innerText = "🔊 Произношение...";
      };
      audioElement.onended = () => {
        if (audioStatusSpan && !audioStatusSpan.innerText.includes("Аудио не найдено")) 
          audioStatusSpan.innerText = "🔊 Аудио: из папки audio_terms/";
      };
    }
    
    if (lastPlayedIndex === audioIndex && !audioElement.paused) return;
    
    audioElement.pause();
    audioElement.src = audioFileName;
    audioElement.load();
    lastPlayedIndex = audioIndex;
    
    audioElement.play().catch(e => {
      console.warn(`Не удалось воспроизвести ${audioFileName}:`, e);
      if (audioStatusSpan) {
        audioStatusSpan.innerText = "❌ Аудио-ошибка";
        setTimeout(() => {
          if (audioStatusSpan.innerText === "❌ Аудио-ошибка") 
            audioStatusSpan.innerText = "🔊 Аудио: из папки audio_terms/";
        }, 1200);
      }
    });
  }

  // Озвучить текущий термин (по номеру строки)
  function speakCurrentTerm() {
    if (!items.length) return;
    const termIndex = currentIndex + 1;
    playTermAudio(termIndex);
  }

  // ========== ОСНОВНАЯ ЛОГИКА ==========
  function normalizeString(str) {
    return str.trim().toLowerCase().replace(/\s+/g, ' ');
  }

  function updateStatsUI() {
    correctCountSpan.innerText = correctAnswers;
    totalAnsweredSpan.innerText = totalAnswered;
    progressIndexSpan.innerText = items.length ? (currentIndex + 1) : 0;
    totalWordsSpan.innerText = items.length;
    wordCountDisplay.innerText = `записей: ${items.length}`;
  }

  function getCurrentQA() {
    if (!items.length) return { question: "", answer: "" };
    const item = items[currentIndex];
    if (currentDirection === "forward") {
      return { question: item.term, answer: item.definition };
    } else {
      return { question: item.definition, answer: item.term };
    }
  }

  function generateOptions(correctAns, excludeIndex) {
    let candidates = [];
    for (let i = 0; i < items.length; i++) {
      if (i === excludeIndex) continue;
      let candidate = (currentDirection === "forward") ? items[i].definition : items[i].term;
      candidates.push(candidate);
    }
    let uniqueMap = new Map();
    candidates.forEach(c => { if (!uniqueMap.has(normalizeString(c))) uniqueMap.set(normalizeString(c), c); });
    let unique = Array.from(uniqueMap.values());
    for (let i = unique.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [unique[i], unique[j]] = [unique[j], unique[i]];
    }
    let opts = [correctAns];
    for (let u of unique) {
      if (opts.length >= 4) break;
      if (normalizeString(u) !== normalizeString(correctAns)) opts.push(u);
    }
    while (opts.length < 4) opts.push(correctAns);
    for (let i = opts.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [opts[i], opts[j]] = [opts[j], opts[i]];
    }
    return opts;
  }

  function renderOptions(options) {
    optionsGrid.innerHTML = "";
    options.forEach((opt, idx) => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerText = opt.length > 130 ? opt.slice(0, 127) + "…" : opt;
      btn.setAttribute("data-opt-index", idx);
      btn.addEventListener("click", () => {
        if (!isAnswered) handleAnswer(opt);
      });
      optionsGrid.appendChild(btn);
    });
  }

  // Обработка ответа
  function handleAnswer(userAnswer) {
    if (isAnswered || !items.length) return;
    const normalizedUser = normalizeString(userAnswer);
    const normalizedCorrect = normalizeString(currentCorrectAnswer);
    const isCorrect = (normalizedUser === normalizedCorrect);

    if (isCorrect) correctAnswers++;
    totalAnswered++;
    isAnswered = true;

    if (isCorrect) {
      feedbackArea.innerHTML = "✅ Верно! Отлично!";
      feedbackArea.style.background = "#dcfce7";
      feedbackArea.style.color = "#166534";
    } else {
      feedbackArea.innerHTML = `❌ Ошибка. Правильный ответ:<br>«${currentCorrectAnswer}»`;
      feedbackArea.style.background = "#fee2e2";
      feedbackArea.style.color = "#991b1b";
    }

    // АВТОМАТИЧЕСКОЕ ОЗВУЧИВАНИЕ ТЕРМИНА после ответа
    speakCurrentTerm();

    // Показать кнопку "Озвучить термин" (можно повторно нажать)
    speakTermBtn.style.display = "inline-flex";

    if (currentMode === "choice") {
      const btns = document.querySelectorAll(".option-btn");
      btns.forEach(btn => {
        btn.disabled = true;
        if (normalizeString(btn.innerText) === normalizedCorrect) {
          btn.classList.add("correct-highlight");
        }
        if (!isCorrect && normalizeString(btn.innerText) === normalizedUser && normalizeString(btn.innerText) !== normalizedCorrect) {
          btn.classList.add("wrong-highlight");
        }
      });
    } else {
      answerInput.disabled = true;
      checkAnswerBtn.disabled = true;
    }

    updateStatsUI();
    nextBtn.disabled = false;
    nextBtn.focus();
  }

  function nextQuestion() {
    if (!items.length) return;
    if (!isAnswered) {
      feedbackArea.innerHTML = "⚠️ Сначала ответьте на вопрос!";
      feedbackArea.style.background = "#fef9c3";
      return;
    }
    currentIndex = (currentIndex + 1) % items.length;
    isAnswered = false;
    // скрываем кнопку озвучивания для нового вопроса
    speakTermBtn.style.display = "none";
    renderCurrentQuestion();
  }

  function renderCurrentQuestion() {
    if (!items.length) {
      questionTextEl.innerText = "📂 Загрузите файл";
      questionHint.innerText = "Нет данных";
      nextBtn.disabled = true;
      speakTermBtn.style.display = "none";
      if (inputModeContainer.style.display !== 'none') answerInput.disabled = true;
      return;
    }

    const { question, answer } = getCurrentQA();
    currentQuestionWord = question;
    currentCorrectAnswer = answer;
    questionTextEl.innerText = question;

    if (currentType === "definition") {
      questionHint.innerText = (currentDirection === "forward") ? "📖 Дайте определение термину" : "🔍 Какой термин соответствует определению?";
    } else {
      questionHint.innerText = (currentDirection === "forward") ? "🌍 Переведите на другой язык" : "🔤 Как переводится это слово?";
    }

    if (currentMode === "input") {
      inputModeContainer.style.display = "block";
      choiceModeContainer.style.display = "none";
      answerInput.value = "";
      answerInput.disabled = isAnswered;
      checkAnswerBtn.disabled = isAnswered;
      if (!isAnswered) answerInput.focus();
    } else {
      inputModeContainer.style.display = "none";
      choiceModeContainer.style.display = "block";
      currentOptions = generateOptions(currentCorrectAnswer, currentIndex);
      renderOptions(currentOptions);
    }

    nextBtn.disabled = !isAnswered;
    if (!isAnswered) feedbackArea.innerHTML = "";
    updateStatsUI();
  }

  // ========== ЗАГРУЗКА ФАЙЛА ==========
  function parseFile(content) {
    const lines = content.split(/\r?\n/);
    const parsed = [];
    let longCount = 0;
    for (let line of lines) {
      line = line.trim();
      if (line === "") continue;
      let sepIndex = line.indexOf(" - ");
      if (sepIndex === -1) sepIndex = line.indexOf("-");
      if (sepIndex === -1) continue;
      let left = line.substring(0, sepIndex).trim();
      let right = line.substring(sepIndex + (line.indexOf(" - ") !== -1 ? 3 : 1)).trim();
      if (!left || !right) continue;
      parsed.push({ term: left, definition: right });
      if (right.split(/\s+/).length > 8) longCount++;
    }
    const isDefinitionMode = (parsed.length && (longCount > parsed.length * 0.3 || longCount > 5));
    return { items: parsed, autoType: isDefinitionMode ? "definition" : "translation" };
  }

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const { items: newItems, autoType } = parseFile(e.target.result);
      if (newItems.length === 0) {
        alert("Файл не содержит пар в формате 'термин - определение' или 'слово - перевод'");
        return;
      }
      items = newItems;
      currentType = autoType;
      typeBtns.forEach(btn => {
        if (btn.dataset.type === currentType) btn.classList.add("active");
        else btn.classList.remove("active");
      });
      currentIndex = 0;
      correctAnswers = 0;
      totalAnswered = 0;
      isAnswered = false;
      speakTermBtn.style.display = "none";
      renderCurrentQuestion();
      localStorage.setItem("lingotrain_items", JSON.stringify(items));
      localStorage.setItem("lingotrain_type", currentType);
      feedbackArea.innerHTML = `✅ Загружено ${items.length} записей<br>🎵 Аудио из папки audio_terms/timbrica-speech (N).mp3`;
      setTimeout(() => { if (feedbackArea.innerHTML.includes("Загружено")) feedbackArea.innerHTML = ""; }, 3000);
    };
    reader.readAsText(file, "UTF-8");
  }

  function loadFromStorage() {
    const saved = localStorage.getItem("lingotrain_items");
    if (saved) {
      try {
        items = JSON.parse(saved);
        currentType = localStorage.getItem("lingotrain_type") || "translation";
        typeBtns.forEach(btn => {
          if (btn.dataset.type === currentType) btn.classList.add("active");
          else btn.classList.remove("active");
        });
        currentIndex = 0;
        correctAnswers = 0;
        totalAnswered = 0;
        isAnswered = false;
        renderCurrentQuestion();
      } catch(e) {}
    }
  }

  // ========== УПРАВЛЕНИЕ ==========
  function resetStats() {
    if (!items.length) return;
    correctAnswers = 0;
    totalAnswered = 0;
    isAnswered = false;
    currentIndex = 0;
    speakTermBtn.style.display = "none";
    renderCurrentQuestion();
    feedbackArea.innerHTML = "📊 Статистика сброшена. Начинаем сначала!";
    setTimeout(() => { if (feedbackArea.innerHTML.includes("сброшена")) feedbackArea.innerHTML = ""; }, 1500);
  }

  function shuffleItems() {
    if (items.length < 2) return;
    for (let i = items.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [items[i], items[j]] = [items[j], items[i]];
    }
    currentIndex = 0;
    correctAnswers = 0;
    totalAnswered = 0;
    isAnswered = false;
    speakTermBtn.style.display = "none";
    renderCurrentQuestion();
    feedbackArea.innerHTML = "🃏 Слова перемешаны!";
    setTimeout(() => { if (feedbackArea.innerHTML.includes("перемешаны")) feedbackArea.innerHTML = ""; }, 1200);
    localStorage.setItem("lingotrain_items", JSON.stringify(items));
  }

  function setType(type) {
    currentType = type;
    localStorage.setItem("lingotrain_type", type);
    typeBtns.forEach(btn => {
      if (btn.dataset.type === type) btn.classList.add("active");
      else btn.classList.remove("active");
    });
    if (items.length) renderCurrentQuestion();
  }
  function setMode(mode) {
    currentMode = mode;
    modeBtns.forEach(btn => {
      if (btn.dataset.mode === mode) btn.classList.add("active");
      else btn.classList.remove("active");
    });
    if (items.length) renderCurrentQuestion();
  }
  function setDirection(dir) {
    currentDirection = dir;
    dirBtns.forEach(btn => {
      if (btn.dataset.dir === dir) btn.classList.add("active");
      else btn.classList.remove("active");
    });
    if (items.length) renderCurrentQuestion();
  }

  // ========== КЛАВИАТУРА ==========
  function handleGlobalKey(e) {
    if (!items.length) return;
    if (currentMode === "choice" && !isAnswered) {
      const key = e.key;
      if (key >= '1' && key <= '4') {
        const idx = parseInt(key) - 1;
        const btns = document.querySelectorAll(".option-btn");
        if (btns[idx]) {
          e.preventDefault();
          btns[idx].click();
        }
      }
    }
    if (e.key === "Enter") {
      e.preventDefault();
      if (!isAnswered) {
        if (currentMode === "input") {
          const ans = answerInput.value.trim();
          if (ans) handleAnswer(ans);
          else feedbackArea.innerHTML = "✏️ Введите ответ!";
        }
      } else {
        nextQuestion();
      }
    }
  }

  // ========== ИНИЦИАЛИЗАЦИЯ ==========
  fileInput.addEventListener("change", (e) => { if (e.target.files.length) loadFile(e.target.files[0]); });
  nextBtn.addEventListener("click", nextQuestion);
  speakTermBtn.addEventListener("click", () => speakCurrentTerm());
  checkAnswerBtn.addEventListener("click", () => {
    if (isAnswered || !items.length) return;
    const ans = answerInput.value.trim();
    if (!ans) { feedbackArea.innerHTML = "Введите перевод или определение"; return; }
    handleAnswer(ans);
  });
  shuffleBtn.addEventListener("click", () => { if (items.length) shuffleItems(); else alert("Сначала загрузите файл"); });
  resetStatsBtn.addEventListener("click", resetStats);
  typeBtns.forEach(btn => btn.addEventListener("click", () => setType(btn.dataset.type)));
  modeBtns.forEach(btn => btn.addEventListener("click", () => setMode(btn.dataset.mode)));
  dirBtns.forEach(btn => btn.addEventListener("click", () => setDirection(btn.dataset.dir)));

  document.addEventListener("keydown", handleGlobalKey);
  loadFromStorage();
  if (!items.length) {
    questionTextEl.innerText = "📁 Загрузите .txt файл";
    nextBtn.disabled = true;
  } else {
    renderCurrentQuestion();
  }
</script>
</body>
</html>
